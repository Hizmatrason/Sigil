# Docker Compose for local development.
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# This starts infrastructure dependencies only (PostgreSQL, Redis, MinIO, Mailpit).
# The .NET API runs via `dotnet watch run --project src/Sigil.Api`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigil-postgres
    environment:
      POSTGRES_DB: sigil
      POSTGRES_USER: sigil
      POSTGRES_PASSWORD: sigil_dev
    ports:
      - "5432:5432"
    volumes:
      - sigil-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigil -d sigil"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sigil-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sigil-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sigil-miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: sigil-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  sigil-pgdata:
  sigil-miniodata:
